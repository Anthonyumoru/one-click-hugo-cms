backend:
  name: git-gateway
  branch: main
media_folder: site/static/img
public_folder: /img
collections:
    - name: "blog"
    label: "Blog"
    folder: "site/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: "Title", name: "title", widget: "string"}
            - {label: "Date", name: "date", widget: "datetime"}
            - {label: "Body", name: "body", widget: "markdown"}
